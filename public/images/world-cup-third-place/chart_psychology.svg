<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" role="img">
<rect width="800" height="260" fill="#fbfaf6"/>
<text x="400" y="26" text-anchor="middle" fill="#222939" font-family="Verdana,sans-serif" font-size="14" font-weight="700">Counterfactual psychology (Medvec et al. 1995)</text>
<rect x="40" y="55" width="320" height="170" fill="#f5efe3" stroke="#60739f" stroke-width="2"/>
<text x="200" y="85" text-anchor="middle" fill="#8B3A3A" font-size="16" font-weight="700" font-family="Verdana,sans-serif">SILVER (final loser)</text>
<text x="200" y="120" text-anchor="middle" fill="#222939" font-size="13" font-family="Verdana,sans-serif">Upward counterfactual:</text>
<text x="200" y="145" text-anchor="middle" fill="#60739f" font-size="13" font-family="Verdana,sans-serif">"I almost won gold."</text>
<text x="200" y="180" text-anchor="middle" fill="#60739f" font-size="12" font-family="Verdana,sans-serif">Result: more regret</text>
<text x="200" y="205" text-anchor="middle" fill="#60739f" font-size="11" font-family="Verdana,sans-serif">High-stakes final: choke risk</text>
<rect x="440" y="55" width="320" height="170" fill="#f5efe3" stroke="#556B2F" stroke-width="2"/>
<text x="600" y="85" text-anchor="middle" fill="#556B2F" font-size="16" font-weight="700" font-family="Verdana,sans-serif">BRONZE (3rd winner)</text>
<text x="600" y="120" text-anchor="middle" fill="#222939" font-size="13" font-family="Verdana,sans-serif">Downward counterfactual:</text>
<text x="600" y="145" text-anchor="middle" fill="#60739f" font-size="13" font-family="Verdana,sans-serif">"At least I am not 4th."</text>
<text x="600" y="180" text-anchor="middle" fill="#60739f" font-size="12" font-family="Verdana,sans-serif">Result: more relief</text>
<text x="600" y="205" text-anchor="middle" fill="#60739f" font-size="11" font-family="Verdana,sans-serif">During match: salvage incentive</text>
</svg>