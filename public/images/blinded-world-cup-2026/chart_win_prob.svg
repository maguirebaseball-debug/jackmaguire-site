<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 270" role="img" aria-label="Win probability Side A vs Side B">
<rect width="800" height="270" fill="#fbfaf6"/>

<text x="400" y="32" text-anchor="middle" fill="#222939" font-family="Verdana,sans-serif" font-size="16" font-weight="700">Who wins the cup path? (100,000 simulations)</text>
<text x="48" y="88" fill="#222939" font-family="Verdana,sans-serif" font-size="14" font-weight="700">Side A</text>
<text x="48" y="108" fill="#60739f" font-family="Verdana,sans-serif" font-size="11">higher Elo · tighter defense</text>
<rect x="160" y="78" width="520" height="36" rx="4" fill="#f5efe3" stroke="#e5e9f0"/>
<rect x="160" y="78" width="324.3" height="36" rx="4" fill="#556B2F"/>
<text x="472.3" y="102" text-anchor="end" fill="#fff" font-family="Verdana,sans-serif" font-size="15" font-weight="700">62.4%</text>
<text x="48" y="168" fill="#222939" font-family="Verdana,sans-serif" font-size="14" font-weight="700">Side B</text>
<text x="48" y="188" fill="#60739f" font-family="Verdana,sans-serif" font-size="11">higher scoring rate · more open</text>
<rect x="160" y="158" width="520" height="36" rx="4" fill="#f5efe3" stroke="#e5e9f0"/>
<rect x="160" y="158" width="195.7" height="36" rx="4" fill="#3A5A7A"/>
<text x="365.7" y="182" text-anchor="start" fill="#222939" font-family="Verdana,sans-serif" font-size="15" font-weight="700">37.6%</text>
<text x="400" y="240" text-anchor="middle" fill="#60739f" font-family="Verdana,sans-serif" font-size="12">Includes 90 minutes, extra time, and penalties. Not a lock.</text>

</svg>
