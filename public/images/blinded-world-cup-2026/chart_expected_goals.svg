<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" role="img" aria-label="Expected goals Side A vs Side B">
<rect width="800" height="300" fill="#fbfaf6"/>

<text x="400" y="30" text-anchor="middle" fill="#222939" font-family="Verdana,sans-serif" font-size="16" font-weight="700">Expected goals by end of play</text>
<line x1="80" y1="230" x2="720" y2="230" stroke="#e5e9f0" stroke-width="2"/>
<!-- A -->
<rect x="220" y="124.4" width="120" height="105.6" fill="#556B2F"/>
<text x="280" y="112.4" text-anchor="middle" fill="#3A4B1C" font-family="Verdana,sans-serif" font-size="22" font-weight="700">1.32</text>
<text x="280" y="252" text-anchor="middle" fill="#222939" font-family="Verdana,sans-serif" font-size="14" font-weight="700">Side A</text>
<!-- B -->
<rect x="460" y="160.4" width="120" height="69.6" fill="#3A5A7A"/>
<text x="520" y="148.4" text-anchor="middle" fill="#3A5A7A" font-family="Verdana,sans-serif" font-size="22" font-weight="700">0.87</text>
<text x="520" y="252" text-anchor="middle" fill="#222939" font-family="Verdana,sans-serif" font-size="14" font-weight="700">Side B</text>
<text x="400" y="275" text-anchor="middle" fill="#60739f" font-family="Verdana,sans-serif" font-size="12">Extra time included. Penalties do not add field goals.</text>

</svg>
