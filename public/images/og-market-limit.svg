<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Warm Earthy Paper Background -->
  <rect width="1200" height="630" fill="#FAF9F6" />
  
  <!-- Subtle Classic Double Border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#556B2F" stroke-width="1" />
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#556B2F" stroke-width="2" />

  <!-- Left Side: Title and Macroeconomic Bounds -->
  <g transform="translate(80, 90)">
    <!-- Category Tag -->
    <text x="0" y="0" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="bold" fill="#556B2F" letter-spacing="4">QUANTITATIVE MACROECONOMICS</text>
    
    <!-- Bold Classical Serif Title -->
    <text x="0" y="55" font-family="'Fraunces', 'Lora', 'Georgia', serif" font-size="52" font-weight="bold" fill="#2A2A2A">The Theoretical Limit</text>
    <text x="0" y="115" font-family="'Fraunces', 'Lora', 'Georgia', serif" font-size="52" font-weight="bold" fill="#2A2A2A">of the Equity Market</text>

    <!-- HBR-Style Metric Blocks -->
    <g transform="translate(0, 180)">
      <!-- Metric 1 -->
      <text x="0" y="20" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="bold" fill="#556B2F" letter-spacing="2">I / VALUATION ASYMPTOTE</text>
      <text x="0" y="50" font-family="'Fraunces', 'Lora', serif" font-size="24" font-weight="bold" fill="#2A2A2A">Gordon Growth Limit</text>
      <text x="0" y="72" font-family="'Outfit', sans-serif" font-size="13" fill="#555555">Mathematical convergence of growth and discount rates</text>

      <!-- Metric 2 -->
      <text x="0" y="120" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="bold" fill="#556B2F" letter-spacing="2">II / LABOUR CONSTRAINT</text>
      <text x="0" y="150" font-family="'Fraunces', 'Lora', serif" font-size="24" font-weight="bold" fill="#2A2A2A">Subsistence Floor</text>
      <text x="0" y="172" font-family="'Outfit', sans-serif" font-size="13" fill="#555555">Minimum consumer income required to sustain corporate revenue</text>

      <!-- Metric 3 -->
      <text x="0" y="220" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="bold" fill="#556B2F" letter-spacing="2">III / RISK PREMIUM</text>
      <text x="0" y="250" font-family="'Fraunces', 'Lora', serif" font-size="24" font-weight="bold" fill="#2A2A2A">ERP Compression Floor</text>
      <text x="0" y="272" font-family="'Outfit', sans-serif" font-size="13" fill="#555555">Structural limit of capital provider time preference</text>
    </g>
  </g>

  <!-- Right Side: The Mathematical Chart -->
  <g transform="translate(620, 80)">
    <!-- Chart Background -->
    <rect x="30" y="60" width="450" height="340" fill="#F4F3EF" rx="6" />
    <rect x="30" y="60" width="450" height="340" fill="none" stroke="#E3E1D9" stroke-width="1" rx="6" />

    <!-- Gold Asymptote Line -->
    <line x1="30" y1="120" x2="480" y2="120" stroke="#C5A059" stroke-width="2" stroke-dasharray="6,5" />
    <text x="40" y="110" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="bold" fill="#B38B3D" letter-spacing="1">THEORETICAL CEILING (100% CAPITAL EXTRACT)</text>

    <!-- Axes -->
    <!-- Y-Axis -->
    <line x1="60" y1="80" x2="60" y2="370" stroke="#4A4A4A" stroke-width="1.5" />
    <!-- X-Axis -->
    <line x1="60" y1="370" x2="460" y2="370" stroke="#4A4A4A" stroke-width="1.5" />

    <!-- Asymptotic Curve -->
    <path d="M 60,350 C 130,330 200,190 280,145 C 340,129 410,122 460,121" fill="none" stroke="#556B2F" stroke-width="5" stroke-linecap="round" />

    <!-- Historical Peak Markers -->
    <circle cx="120" cy="310" r="4.5" fill="#2A2A2A" />
    <text x="130" y="313" font-family="'Outfit', sans-serif" font-size="9" font-weight="bold" fill="#555555">1929 PEAK</text>

    <circle cx="210" cy="220" r="4.5" fill="#2A2A2A" />
    <text x="220" y="223" font-family="'Outfit', sans-serif" font-size="9" font-weight="bold" fill="#555555">2000 PEAK</text>

    <circle cx="280" cy="145" r="4.5" fill="#2A2A2A" />
    <text x="290" y="148" font-family="'Outfit', sans-serif" font-size="9" font-weight="bold" fill="#555555">2021 PEAK</text>

    <!-- Present Marker -->
    <circle cx="360" cy="127" r="6" fill="#556B2F" stroke="#FAF9F6" stroke-width="2" />
    <text x="372" y="131" font-family="'Outfit', sans-serif" font-size="11" font-weight="bold" fill="#556B2F">2026 PRESENT</text>

    <!-- Axes Labels -->
    <text x="260" y="392" font-family="'Outfit', sans-serif" font-size="11" font-weight="bold" fill="#4A4A4A" letter-spacing="1" text-anchor="middle">SYSTEMIC RESOURCE LEVERAGE</text>
    <text x="20" y="225" transform="rotate(-90, 20, 225)" font-family="'Outfit', sans-serif" font-size="11" font-weight="bold" fill="#4A4A4A" letter-spacing="1" text-anchor="middle">VALUATION / REAL OUTPUT</text>
  </g>

  <!-- Bottom Right: Domain Signature -->
  <text x="1120" y="550" font-family="'Outfit', 'Inter', sans-serif" font-size="13" font-weight="bold" fill="#556B2F" letter-spacing="4" text-anchor="end">JACKMAGUIRE.ORG</text>
</svg>
